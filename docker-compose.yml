services:

  # ── PHP-FPM ────────────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: laravel_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
    networks:
      - laravel
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      APP_ENV:          ${APP_ENV:-local}
      APP_KEY:          ${APP_KEY}
      APP_URL:          ${APP_URL:-http://localhost}
      DB_CONNECTION:    mysql
      DB_HOST:          db
      DB_PORT:          3306
      DB_DATABASE:      ${DB_DATABASE:-laravel}
      DB_USERNAME:      ${DB_USERNAME:-laravel}
      DB_PASSWORD:      ${DB_PASSWORD:-secret}
      REDIS_HOST:       redis
      REDIS_PORT:       6379
      CACHE_DRIVER:     redis
      SESSION_DRIVER:   redis
      QUEUE_CONNECTION: redis
      AUTO_SEED:        ${AUTO_SEED:-false}

  # ── Nginx ──────────────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: laravel_nginx
    restart: unless-stopped
    ports:
      - "${APP_PORT:-80}:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - laravel
    depends_on:
      - app

  # ── MySQL 8.4 ──────────────────────────────────────────────────────────────
  db:
    image: mysql:8.4
    container_name: laravel_db
    restart: unless-stopped
    ports:
      - "${DB_PORT_FORWARD:-3306}:3306"
    environment:
      MYSQL_DATABASE:      ${DB_DATABASE:-laravel}
      MYSQL_USER:          ${DB_USERNAME:-laravel}
      MYSQL_PASSWORD:      ${DB_PASSWORD:-secret}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root_secret}
    volumes:
      - db_data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/my.cnf
    networks:
      - laravel
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost",
             "-u", "root", "-p${DB_ROOT_PASSWORD:-root_secret}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Redis 7 ────────────────────────────────────────────────────────────────
  redis:
    image: redis:7.4-alpine
    container_name: laravel_redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT_FORWARD:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - laravel
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Queue Worker ───────────────────────────────────────────────────────────
  queue:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: laravel_queue
    restart: unless-stopped
    working_dir: /var/www/html
    command: php artisan queue:work --tries=3 --timeout=90 --sleep=3
    volumes:
      - .:/var/www/html
    networks:
      - laravel
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      APP_ENV:          ${APP_ENV:-local}
      APP_KEY:          ${APP_KEY}
      DB_CONNECTION:    mysql
      DB_HOST:          db
      DB_PORT:          3306
      DB_DATABASE:      ${DB_DATABASE:-laravel}
      DB_USERNAME:      ${DB_USERNAME:-laravel}
      DB_PASSWORD:      ${DB_PASSWORD:-secret}
      REDIS_HOST:       redis
      REDIS_PORT:       6379
      QUEUE_CONNECTION: redis

  # ── Scheduler ─────────────────────────────────────────────────────────────
  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: laravel_scheduler
    restart: unless-stopped
    working_dir: /var/www/html
    command: >
      sh -c "while true; do php artisan schedule:run --no-interaction; sleep 60; done"
    volumes:
      - .:/var/www/html
    networks:
      - laravel
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      APP_ENV:       ${APP_ENV:-local}
      APP_KEY:       ${APP_KEY}
      DB_CONNECTION: mysql
      DB_HOST:       db
      DB_PORT:       3306
      DB_DATABASE:   ${DB_DATABASE:-laravel}
      DB_USERNAME:   ${DB_USERNAME:-laravel}
      DB_PASSWORD:   ${DB_PASSWORD:-secret}
      REDIS_HOST:    redis
      REDIS_PORT:    6379

# ── Networks & Volumes ────────────────────────────────────────────────────────
networks:
  laravel:
    driver: bridge

volumes:
  db_data:
    driver: local
  redis_data:
    driver: local